[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "https://www.azoneai.ru/*"
  to = "https://azoneai.ru/:splat"
  status = 301
  force = true

# /pilot — старый CTA «Заказать пилот», страница не существовала
[[redirects]]
  from = "/pilot"
  to = "/contact?product=other"
  status = 301

[[redirects]]
  from = "/pilot/"
  to = "/contact?product=other"
  status = 301

# Исходный .md лежал в src/pages/blog/ и мог быть сгенерирован Astro
[[redirects]]
  from = "/blog/10-sravnenie-llm-seo-optimized"
  to = "/blog/10-sravnenie-llm/"
  status = 301

[[redirects]]
  from = "/blog/10-sravnenie-llm-seo-optimized/"
  to = "/blog/10-sravnenie-llm/"
  status = 301

[[redirects]]
  from = "/blog/sravnenie-llm-seo-optimized"
  to = "/blog/10-sravnenie-llm/"
  status = 301

[[redirects]]
  from = "/blog/sravnenie-llm-seo-optimized/"
  to = "/blog/10-sravnenie-llm/"
  status = 301

# Исходный .md без префикса «08-»
[[redirects]]
  from = "/blog/reestr-doverennyh-ii-modelej-rossiya-2026"
  to = "/blog/08-reestr-doverennyh-ii-modelej-rossiya-2026/"
  status = 301

[[redirects]]
  from = "/blog/reestr-doverennyh-ii-modelej-rossiya-2026/"
  to = "/blog/08-reestr-doverennyh-ii-modelej-rossiya-2026/"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
